name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  packages:
    name: Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  publish-sdk-alpha:
    name: Publish SDK alpha to npm
    needs: [packages]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/publish-npm.yml
    with:
      package: sdk
      channel: alpha
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli-alpha:
    name: Publish CLI alpha to npm
    needs: [packages, publish-sdk-alpha]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/publish-npm.yml
    with:
      package: cli
      channel: alpha
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Release npm packages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish from. Defaults to main."
        required: false
        default: "main"

concurrency:
  group: release-npm
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  preflight:
    name: Check npm publish token
    runs-on: ubuntu-latest
    steps:
      - name: Require NPM_TOKEN
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN is not configured in MemaxLabs/memax. Add a classic npm token with publish access before running this workflow."
            exit 1
          fi

  publish-sdk-stable:
    name: Publish SDK stable to npm
    needs: [preflight]
    uses: ./.github/workflows/publish-npm.yml
    with:
      package: sdk
      channel: stable
      ref: ${{ inputs.ref || 'main' }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli-stable:
    name: Publish CLI stable to npm
    needs: [publish-sdk-stable]
    uses: ./.github/workflows/publish-npm.yml
    with:
      package: cli
      channel: stable
      ref: ${{ inputs.ref || 'main' }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-sdk:
    name: Create SDK GitHub release
    needs: [publish-sdk-stable]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Create package release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ needs.publish-sdk-stable.outputs.package_name }}
          VERSION: ${{ needs.publish-sdk-stable.outputs.version }}
          PUBLISHED: ${{ needs.publish-sdk-stable.outputs.published }}
        run: |
          set -euo pipefail
          tag="$PACKAGE_NAME-v$VERSION"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "$tag release already exists, skipping"
            exit 0
          fi

          target="$(git rev-parse HEAD)"
          status="published by this workflow"
          if [ "$PUBLISHED" != "true" ]; then
            status="already existed on npm; this workflow did not republish it"
          fi

          notes=$(cat <<NOTES
          Released \`$PACKAGE_NAME@$VERSION\` to npm.

          - npm: https://www.npmjs.com/package/$PACKAGE_NAME/v/$VERSION
          - Source ref: \`${{ inputs.ref || 'main' }}\`
          - npm status: $status
          NOTES
          )
          # Strip the leading 10-space indent introduced by the YAML
          # block-scalar so the rendered release body isn't all
          # quoted-as-code on GitHub.
          notes=$(echo "$notes" | sed 's/^          //')
          gh release create "$tag" \
            --target "$target" \
            --title "$PACKAGE_NAME v$VERSION" \
            --notes "$notes"

  release-cli:
    name: Create CLI GitHub release
    needs: [publish-cli-stable]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Create package release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ needs.publish-cli-stable.outputs.package_name }}
          VERSION: ${{ needs.publish-cli-stable.outputs.version }}
          PUBLISHED: ${{ needs.publish-cli-stable.outputs.published }}
        run: |
          set -euo pipefail
          tag="$PACKAGE_NAME-v$VERSION"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "$tag release already exists, skipping"
            exit 0
          fi

          target="$(git rev-parse HEAD)"
          status="published by this workflow"
          if [ "$PUBLISHED" != "true" ]; then
            status="already existed on npm; this workflow did not republish it"
          fi

          notes=$(cat <<NOTES
          Released \`$PACKAGE_NAME@$VERSION\` to npm.

          - npm: https://www.npmjs.com/package/$PACKAGE_NAME/v/$VERSION
          - Source ref: \`${{ inputs.ref || 'main' }}\`
          - npm status: $status
          NOTES
          )
          notes=$(echo "$notes" | sed 's/^          //')
          gh release create "$tag" \
            --target "$target" \
            --title "$PACKAGE_NAME v$VERSION" \
            --notes "$notes"
